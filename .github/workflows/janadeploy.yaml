name: demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: runnerlabel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Verify AWS access (optional but recommended)
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # ✅ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 897982268652.dkr.ecr.ap-south-1.amazonaws.com

      # ✅ Build Docker image
      - name: Build Docker image
        run: docker build -t ecr .

      # ✅ Tag Docker image
      - name: Tag Docker image
        run: |
          docker tag ecr:latest 897982268652.dkr.ecr.ap-south-1.amazonaws.com/ecr:latest

      # ✅ Push to ECR
      - name: Push to ECR
        run: |
          docker push 897982268652.dkr.ecr.ap-south-1.amazonaws.com/ecr:latest
          
